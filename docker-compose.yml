x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:16.13-alpine3.23@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: unless-stopped
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    tmpfs:
      - /tmp
      - /var/run/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-findings}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-findings}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-findings} -d ${POSTGRES_DB:-findings}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  seaweedfs:
    image: chrislusf/seaweedfs:4.20
    restart: unless-stopped
    logging: *default-logging
    entrypoint: ["weed"]
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    command:
      [
        "server",
        "-dir=/data",
        "-ip=seaweedfs",
        "-master.port=9333",
        "-volume.port=8080",
        "-filer.port=8888",
        "-s3",
        "-s3.port=8333",
      ]
    environment:
      SEAWEEDFS_S3_ACCESS_KEY: ${SEAWEEDFS_S3_ACCESS_KEY:?Set SEAWEEDFS_S3_ACCESS_KEY in .env}
      SEAWEEDFS_S3_SECRET_KEY: ${SEAWEEDFS_S3_SECRET_KEY:?Set SEAWEEDFS_S3_SECRET_KEY in .env}
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_S3_ACCESS_KEY:?Set SEAWEEDFS_S3_ACCESS_KEY in .env}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_S3_SECRET_KEY:?Set SEAWEEDFS_S3_SECRET_KEY in .env}
    ports:
      - "127.0.0.1:${SEAWEEDFS_S3_PORT:-8333}:8333"
    volumes:
      - seaweedfs_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    depends_on:
      db:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      FINDINGS_LOG_LEVEL: ${FINDINGS_LOG_LEVEL:-INFO}
      FINDINGS_RUNTIME_MODE: ${FINDINGS_RUNTIME_MODE:-development}
      POSTGRES_HOST: ${POSTGRES_HOST:?Set POSTGRES_HOST in .env}
      POSTGRES_SERVICE_PORT: ${POSTGRES_SERVICE_PORT:?Set POSTGRES_SERVICE_PORT in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      FINDINGS_TRUST_PROXY_HEADERS: ${FINDINGS_TRUST_PROXY_HEADERS:-true}
      FINDINGS_ALLOWED_ORIGINS: ${FINDINGS_ALLOWED_ORIGINS:-["http://localhost:5173","http://localhost:3000"]}
      FINDINGS_ALLOWED_METHODS: ${FINDINGS_ALLOWED_METHODS:-["GET","POST","PATCH","DELETE","OPTIONS"]}
      FINDINGS_ALLOWED_HEADERS: ${FINDINGS_ALLOWED_HEADERS:-["Authorization","Content-Type","Accept","If-None-Match"]}
      FINDINGS_OBJECT_STORAGE_ENDPOINT: seaweedfs:8333
      FINDINGS_OBJECT_STORAGE_ACCESS_KEY: ${SEAWEEDFS_S3_ACCESS_KEY:?Set SEAWEEDFS_S3_ACCESS_KEY in .env}
      FINDINGS_OBJECT_STORAGE_SECRET_KEY: ${SEAWEEDFS_S3_SECRET_KEY:?Set SEAWEEDFS_S3_SECRET_KEY in .env}
      FINDINGS_OBJECT_STORAGE_SECURE: ${FINDINGS_OBJECT_STORAGE_SECURE:-false}
      FINDINGS_OBJECT_STORAGE_EVIDENCE_BUCKET: ${FINDINGS_OBJECT_STORAGE_EVIDENCE_BUCKET:-finding-attachments}
      FINDINGS_OBJECT_STORAGE_REPORTS_BUCKET: ${FINDINGS_OBJECT_STORAGE_REPORTS_BUCKET:-generated-reports}
      FINDINGS_REPORT_RETENTION_DAYS: ${FINDINGS_REPORT_RETENTION_DAYS:-365}
      FINDINGS_ATTACHMENT_MAX_FILE_SIZE_MB: ${FINDINGS_ATTACHMENT_MAX_FILE_SIZE_MB:-25}
      FINDINGS_REPORT_MAX_FINDINGS: ${FINDINGS_REPORT_MAX_FINDINGS:-250}
      FINDINGS_REPORT_MAX_INPUT_CHARS: ${FINDINGS_REPORT_MAX_INPUT_CHARS:-200000}
      FINDINGS_REPORT_MAX_OUTPUT_SIZE_MB: ${FINDINGS_REPORT_MAX_OUTPUT_SIZE_MB:-25}
      FINDINGS_ACCESS_TOKEN_EXPIRE_MINUTES: ${FINDINGS_ACCESS_TOKEN_EXPIRE_MINUTES:-5}
      FINDINGS_REFRESH_TOKEN_EXPIRE_DAYS: ${FINDINGS_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FINDINGS_REFRESH_TOKEN_FAMILY_MAX_LIFETIME_DAYS: ${FINDINGS_REFRESH_TOKEN_FAMILY_MAX_LIFETIME_DAYS:-30}
      FINDINGS_REFRESH_SESSION_RETENTION_DAYS: ${FINDINGS_REFRESH_SESSION_RETENTION_DAYS:-}
      FINDINGS_RATE_LIMIT_LOGIN: ${FINDINGS_RATE_LIMIT_LOGIN:-5/minute}
      FINDINGS_RATE_LIMIT_API: ${FINDINGS_RATE_LIMIT_API:-60/minute}
      FINDINGS_MAILJET_API_KEY: ${FINDINGS_MAILJET_API_KEY:-}
      FINDINGS_MAILJET_API_SECRET: ${FINDINGS_MAILJET_API_SECRET:-}
      FINDINGS_MAILJET_FROM_EMAIL: ${FINDINGS_MAILJET_FROM_EMAIL:-noreply@findings.local}
      FINDINGS_MAILJET_FROM_NAME: ${FINDINGS_MAILJET_FROM_NAME:-VulnLedger}
      FINDINGS_APP_BASE_URL: ${FINDINGS_APP_BASE_URL:-http://localhost}
      FINDINGS_INITIAL_ADMIN_USERNAME: ${FINDINGS_INITIAL_ADMIN_USERNAME:?Set FINDINGS_INITIAL_ADMIN_USERNAME in .env}
      FINDINGS_INITIAL_ADMIN_PASSWORD: ${FINDINGS_INITIAL_ADMIN_PASSWORD:?Set FINDINGS_INITIAL_ADMIN_PASSWORD in .env}
      FINDINGS_INITIAL_ADMIN_EMAIL: ${FINDINGS_INITIAL_ADMIN_EMAIL:?Set FINDINGS_INITIAL_ADMIN_EMAIL in .env}
      FINDINGS_INITIAL_ADMIN_FULL_NAME: ${FINDINGS_INITIAL_ADMIN_FULL_NAME:?Set FINDINGS_INITIAL_ADMIN_FULL_NAME in .env}
      FINDINGS_APP_VERSION: ${APP_VERSION}
      FINDINGS_CLAMAV_HOST: ${FINDINGS_CLAMAV_HOST:-clamav}
      FINDINGS_CLAMAV_PORT: ${FINDINGS_CLAMAV_PORT:-3310}
      FINDINGS_JWT_ISSUER: ${FINDINGS_JWT_ISSUER:?Set FINDINGS_JWT_ISSUER in .env}
      FINDINGS_JWT_AUDIENCE: ${FINDINGS_JWT_AUDIENCE:?Set FINDINGS_JWT_AUDIENCE in .env}
      FINDINGS_JWT_PRIVATE_KEY_PEM: ${FINDINGS_JWT_PRIVATE_KEY_PEM:-}
      FINDINGS_JWT_PUBLIC_KEY_PEM: ${FINDINGS_JWT_PUBLIC_KEY_PEM:-}
      FINDINGS_JWT_PRIVATE_KEY_FILE: ${FINDINGS_JWT_PRIVATE_KEY_FILE:-}
      FINDINGS_JWT_PUBLIC_KEY_FILE: ${FINDINGS_JWT_PUBLIC_KEY_FILE:-}
      FINDINGS_SESSION_HINT_COOKIE_NAME: ${FINDINGS_SESSION_HINT_COOKIE_NAME:?Set FINDINGS_SESSION_HINT_COOKIE_NAME in .env}
      FINDINGS_OIDC_ENABLED: ${FINDINGS_OIDC_ENABLED:-false}
      FINDINGS_OIDC_CLIENT_ID: ${FINDINGS_OIDC_CLIENT_ID:-}
      FINDINGS_OIDC_CLIENT_SECRET: ${FINDINGS_OIDC_CLIENT_SECRET:-}
      FINDINGS_OIDC_DISCOVERY_URL: ${FINDINGS_OIDC_DISCOVERY_URL:-}
      FINDINGS_OIDC_REDIRECT_URI: ${FINDINGS_OIDC_REDIRECT_URI:-}
      FINDINGS_OIDC_REDIRECT_URI_ALLOWLIST: ${FINDINGS_OIDC_REDIRECT_URI_ALLOWLIST:-[]}
      FINDINGS_OIDC_REQUIRE_NONCE: ${FINDINGS_OIDC_REQUIRE_NONCE:-true}
      FINDINGS_OIDC_DEFAULT_ROLE: ${FINDINGS_OIDC_DEFAULT_ROLE:-reviewer}
    volumes:
      - ./secrets:/run/secrets:ro
      - ./.env:/run/config/vulnledger.env:ro
      - ./docker-compose.yml:/run/config/docker-compose.yml:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
  frontend:
    build:
      context: ./frontend
      args:
        APP_VERSION: ${APP_VERSION}
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"

  caddy-init:
    build:
      context: ./caddy
    image: vulnledger-caddy:2.11.2-ratelimit
    restart: "no"
    logging: *default-logging
    user: "0:0"
    entrypoint: ["/usr/local/bin/volume-migrate.sh"]
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  caddy:
    build:
      context: ./caddy
    image: vulnledger-caddy:2.11.2-ratelimit
    restart: unless-stopped
    logging: *default-logging
    user: "10001:10001"
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    depends_on:
      caddy-init:
        condition: service_completed_successfully
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    environment:
      CADDY_HOST: ${CADDY_HOST:-http://localhost}
      CADDY_ATTACHMENT_MAX_SIZE: ${CADDY_ATTACHMENT_MAX_SIZE:-30MB}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  backup:
    build: ./backup
    restart: unless-stopped
    logging: *default-logging
    user: "postgres"
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-findings}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-findings}
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_CRON: "0 2 * * *"
      BACKUP_ENCRYPTION_SECRET_FILE: ${BACKUP_ENCRYPTION_SECRET_FILE:-/run/secrets/backup_encryption_passphrase}
      BACKUP_ENCRYPTION_REQUIRED: ${BACKUP_ENCRYPTION_REQUIRED:-false}
      FINDINGS_RUNTIME_MODE: ${FINDINGS_RUNTIME_MODE:-development}
    volumes:
      - backups:/backups
      - ./secrets:/run/secrets:ro

  clamav:
    image: clamav/clamav:1.5.2@sha256:c592fa56f9c538837a9c76faf17337e9b7d5e099332dd33be65c6cc80d179d0b
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "SETGID", "SETUID"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp
      - /run/clamav
      - /var/lock
      - /var/log/clamav
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    ports:
      - "127.0.0.1:${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  gatus:
    image: twinproduction/gatus:v5.35.0@sha256:21609f31be8c4e680ce3004b24276305666239c99aff58391503f3fb6142f39d
    profiles: ["monitoring"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    volumes:
      - ./monitoring/gatus.yaml:/config/config.yaml:ro
    ports:
      # Default: loopback-only (host-local). Override via GATUS_BIND_IP in .env to
      # expose to the LAN, e.g. GATUS_BIND_IP=0.0.0.0 (then restrict via host
      # firewall) or GATUS_BIND_IP=192.168.1.50 to bind to a specific LAN NIC.
      - "${GATUS_BIND_IP:-127.0.0.1}:${GATUS_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  seaweedfs_data:
  caddy_data:
  caddy_config:
  backups:
  clamav_data:
