x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:16.13-alpine3.23@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: unless-stopped
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp
      - /var/run/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-findings}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-findings}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-findings} -d ${POSTGRES_DB:-findings}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      FINDINGS_LOG_LEVEL: ${FINDINGS_LOG_LEVEL:-INFO}
      FINDINGS_RUNTIME_MODE: ${FINDINGS_RUNTIME_MODE:-development}
      FINDINGS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-findings}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-findings}
      FINDINGS_SECRET_KEY: ${FINDINGS_SECRET_KEY:?Set FINDINGS_SECRET_KEY in .env}
      FINDINGS_TRUST_PROXY_HEADERS: ${FINDINGS_TRUST_PROXY_HEADERS:-true}
      FINDINGS_ALLOWED_METHODS: ${FINDINGS_ALLOWED_METHODS:-["GET","POST","PATCH","DELETE","OPTIONS"]}
      FINDINGS_ALLOWED_HEADERS: ${FINDINGS_ALLOWED_HEADERS:-["Authorization","Content-Type","Accept","If-None-Match"]}
      FINDINGS_MINIO_ENDPOINT: minio:9000
      FINDINGS_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      FINDINGS_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      FINDINGS_MINIO_SECURE: ${FINDINGS_MINIO_SECURE:-false}
      FINDINGS_MINIO_EVIDENCE_BUCKET: ${FINDINGS_MINIO_EVIDENCE_BUCKET:-finding-attachments}
      FINDINGS_MINIO_REPORTS_BUCKET: ${FINDINGS_MINIO_REPORTS_BUCKET:-generated-reports}
      FINDINGS_ATTACHMENT_MAX_FILE_SIZE_MB: ${FINDINGS_ATTACHMENT_MAX_FILE_SIZE_MB:-25}
      FINDINGS_REPORT_MAX_FINDINGS: ${FINDINGS_REPORT_MAX_FINDINGS:-250}
      FINDINGS_REPORT_MAX_INPUT_CHARS: ${FINDINGS_REPORT_MAX_INPUT_CHARS:-200000}
      FINDINGS_REPORT_MAX_OUTPUT_SIZE_MB: ${FINDINGS_REPORT_MAX_OUTPUT_SIZE_MB:-25}
      FINDINGS_MAILJET_API_KEY: ""
      FINDINGS_MAILJET_API_SECRET: ""
      FINDINGS_MAILJET_FROM_EMAIL: "noreply@findings.local"
      FINDINGS_APP_BASE_URL: ${FINDINGS_APP_BASE_URL:-http://localhost}
      FINDINGS_INITIAL_ADMIN_USERNAME: ${FINDINGS_INITIAL_ADMIN_USERNAME:?Set FINDINGS_INITIAL_ADMIN_USERNAME in .env}
      FINDINGS_INITIAL_ADMIN_PASSWORD: ${FINDINGS_INITIAL_ADMIN_PASSWORD:?Set FINDINGS_INITIAL_ADMIN_PASSWORD in .env}
      FINDINGS_INITIAL_ADMIN_EMAIL: ${FINDINGS_INITIAL_ADMIN_EMAIL:?Set FINDINGS_INITIAL_ADMIN_EMAIL in .env}
      FINDINGS_INITIAL_ADMIN_FULL_NAME: ${FINDINGS_INITIAL_ADMIN_FULL_NAME:-Administrator}
      FINDINGS_APP_VERSION: ${APP_VERSION:-0.1.16}
      FINDINGS_CLAMAV_HOST: clamav
      FINDINGS_CLAMAV_PORT: "3310"
      FINDINGS_JWT_PRIMARY_ALGORITHM: ${FINDINGS_JWT_PRIMARY_ALGORITHM:-HS256}
      FINDINGS_JWT_ALLOW_LEGACY_HS256: ${FINDINGS_JWT_ALLOW_LEGACY_HS256:-true}
      FINDINGS_JWT_PRIVATE_KEY_PEM: ${FINDINGS_JWT_PRIVATE_KEY_PEM:-}
      FINDINGS_JWT_PUBLIC_KEY_PEM: ${FINDINGS_JWT_PUBLIC_KEY_PEM:-}
      FINDINGS_OIDC_REDIRECT_URI_ALLOWLIST: ${FINDINGS_OIDC_REDIRECT_URI_ALLOWLIST:-[]}
      FINDINGS_OIDC_REQUIRE_NONCE: ${FINDINGS_OIDC_REQUIRE_NONCE:-true}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
  frontend:
    build:
      context: ./frontend
      args:
        APP_VERSION: ${APP_VERSION:-0.1.16}
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"

  caddy:
    build:
      context: ./caddy
    image: vulnledger-caddy:2.11.2-ratelimit
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    environment:
      CADDY_HOST: ${CADDY_HOST:-http://localhost}
      CADDY_ATTACHMENT_MAX_SIZE: ${CADDY_ATTACHMENT_MAX_SIZE:-30MB}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:2019/config/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  backup:
    build: ./backup
    restart: unless-stopped
    logging: *default-logging
    user: "postgres"
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-findings}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-findings}
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_CRON: "0 2 * * *"
      BACKUP_ENCRYPTION_SECRET_FILE: ${BACKUP_ENCRYPTION_SECRET_FILE:-/run/secrets/backup_encryption_passphrase}
      BACKUP_ENCRYPTION_REQUIRED: ${BACKUP_ENCRYPTION_REQUIRED:-false}
      FINDINGS_RUNTIME_MODE: ${FINDINGS_RUNTIME_MODE:-development}
    volumes:
      - backups:/backups
      - ./secrets:/run/secrets:ro

  clamav:
    image: clamav/clamav:1.4.3@sha256:75fb5fd95fcbe1d7e6d240c369c1572b686ee2c95949d1042b5148de8eddebb4
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp
      - /run/clamav
    ports:
      - "127.0.0.1:${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  gatus:
    image: twinproduction/gatus:v5.20.0@sha256:e655d13d0cb89c64a2e53a853bbca9556a7238e788bc4a08c19aa5fb7938d0da
    profiles: ["monitoring"]
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-findings}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-findings}
    volumes:
      - ./monitoring/gatus.yaml:/config/config.yaml:ro
    ports:
      - "127.0.0.1:${GATUS_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  minio_data:
  caddy_data:
  caddy_config:
  backups:
  clamav_data:
