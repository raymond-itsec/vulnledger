# Root compose shim - includes the 4 per-tier files so that bare
# `docker compose up` at repo root keeps working alongside the
# Make-based workflow (`make -C deploy allinone-up`).
#
# `include:` is a Compose v2.20+ feature (Docker Desktop 4.22+,
# Aug 2023). If your daemon is older, use the Make target instead.
#
# Two ways to bring the stack up after Phase 2.5 (2026-05-05):
#
#   1. `make -C deploy allinone-up`
#      Loads deploy/profiles/allinone.env BEFORE the project .env
#      (so dev-box defaults are set then per-deploy .env overrides).
#      Use this for everyday dev.
#
#   2. `docker compose up -d`
#      Loads only the project .env. Equivalent to the pre-Phase-2
#      behavior: works as long as your .env has all the values the
#      tier files need. No allinone profile defaults are applied.
#      Use this if you have a fully-populated .env and want to skip
#      the Make wrapper.
#
# Both paths target the same compose project name (`vulnledger`),
# so containers share a single project view in `docker compose ls`.

include:
  - deploy/compose/data.yml
  - deploy/compose/app.yml
  - deploy/compose/edge.yml
  - deploy/compose/monitoring.yml
