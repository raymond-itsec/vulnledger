services:
  db:
    image: postgres:16.13-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-findings}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-findings}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      FINDINGS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-findings}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-findings}
      FINDINGS_SECRET_KEY: ${FINDINGS_SECRET_KEY:?Set FINDINGS_SECRET_KEY in .env}
      FINDINGS_TRUST_PROXY_HEADERS: ${FINDINGS_TRUST_PROXY_HEADERS:-true}
      FINDINGS_MINIO_ENDPOINT: minio:9000
      FINDINGS_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      FINDINGS_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      FINDINGS_MINIO_SECURE: ${FINDINGS_MINIO_SECURE:-false}
      FINDINGS_MINIO_EVIDENCE_BUCKET: ${FINDINGS_MINIO_EVIDENCE_BUCKET:-finding-attachments}
      FINDINGS_MINIO_REPORTS_BUCKET: ${FINDINGS_MINIO_REPORTS_BUCKET:-generated-reports}
      FINDINGS_ATTACHMENT_MAX_FILE_SIZE_MB: ${FINDINGS_ATTACHMENT_MAX_FILE_SIZE_MB:-25}
      FINDINGS_REPORT_MAX_FINDINGS: ${FINDINGS_REPORT_MAX_FINDINGS:-250}
      FINDINGS_REPORT_MAX_INPUT_CHARS: ${FINDINGS_REPORT_MAX_INPUT_CHARS:-200000}
      FINDINGS_REPORT_MAX_OUTPUT_SIZE_MB: ${FINDINGS_REPORT_MAX_OUTPUT_SIZE_MB:-25}
      FINDINGS_MAILJET_API_KEY: ""
      FINDINGS_MAILJET_API_SECRET: ""
      FINDINGS_MAILJET_FROM_EMAIL: "noreply@findings.local"
      FINDINGS_APP_BASE_URL: ${FINDINGS_APP_BASE_URL:-http://localhost}
      FINDINGS_INITIAL_ADMIN_USERNAME: ${FINDINGS_INITIAL_ADMIN_USERNAME:?Set FINDINGS_INITIAL_ADMIN_USERNAME in .env}
      FINDINGS_INITIAL_ADMIN_PASSWORD: ${FINDINGS_INITIAL_ADMIN_PASSWORD:?Set FINDINGS_INITIAL_ADMIN_PASSWORD in .env}
      FINDINGS_INITIAL_ADMIN_EMAIL: ${FINDINGS_INITIAL_ADMIN_EMAIL:?Set FINDINGS_INITIAL_ADMIN_EMAIL in .env}
      FINDINGS_INITIAL_ADMIN_FULL_NAME: ${FINDINGS_INITIAL_ADMIN_FULL_NAME:-Administrator}
      FINDINGS_APP_VERSION: ${APP_VERSION:-0.1.15}
      FINDINGS_CLAMAV_HOST: clamav
      FINDINGS_CLAMAV_PORT: "3310"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
  frontend:
    build:
      context: ./frontend
      args:
        APP_VERSION: ${APP_VERSION:-0.1.15}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"

  caddy:
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    environment:
      CADDY_HOST: ${CADDY_HOST:-http://localhost}
      CADDY_ATTACHMENT_MAX_SIZE: ${CADDY_ATTACHMENT_MAX_SIZE:-30MB}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  backup:
    build: ./backup
    restart: unless-stopped
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-findings}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-findings}
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_CRON: "0 2 * * *"
    volumes:
      - backups:/backups

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav_data:/var/lib/clamav

volumes:
  pgdata:
  minio_data:
  caddy_data:
  caddy_config:
  backups:
  clamav_data:
