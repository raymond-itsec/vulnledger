id: builtin-hardcoded-secrets
name: Hardcoded Secrets
category: Cryptography
risk_level: high
title: "Hardcoded Secrets in [component]"
description: |
  The application source code contains hardcoded credentials, API keys, cryptographic keys, or other secret material. These secrets are embedded directly in the codebase rather than being stored in secure configuration management or secrets vaults. Anyone with access to the source code, compiled binaries, or version control history can extract these secrets.
impact: |
  Exposure of hardcoded secrets can lead to unauthorized access to external services, databases, or APIs. If the source code is leaked or accessed by an attacker, all hardcoded credentials are immediately compromised. Rotating hardcoded secrets requires a code change and redeployment, making incident response significantly slower.
recommendation: |
  Remove all hardcoded secrets from the source code and replace them with references to environment variables or a dedicated secrets management solution (e.g., HashiCorp Vault, AWS Secrets Manager, or Azure Key Vault). Rotate all compromised secrets immediately. Implement pre-commit hooks or CI scanning (e.g., git-secrets, trufflehog) to prevent future secret commits. Review version control history for previously committed secrets.
references:
  - CWE-798
  - https://owasp.org/Top10/A02_2021-Cryptographic_Failures/
  - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
