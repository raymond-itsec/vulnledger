id: builtin-weak-password-policy
name: Weak Password Policy
category: Authentication
risk_level: medium
title: "Weak Password Policy in [component]"
description: |
  The application enforces insufficient password complexity requirements, allowing users to set passwords that are easily guessable or susceptible to brute-force and dictionary attacks. Common deficiencies include lack of minimum length requirements, no complexity rules (uppercase, lowercase, digits, special characters), and failure to check passwords against known breached password lists. A weak password policy significantly reduces the effectiveness of password-based authentication as a security control.
impact: |
  Weak passwords are one of the most common entry points for unauthorized access. Attackers can compromise accounts through credential stuffing using breached password databases, dictionary attacks, or targeted brute-force attempts. Once a single account is compromised, lateral movement and privilege escalation become possible, particularly when users reuse passwords across services. Compromised accounts can lead to data breaches, unauthorized transactions, and loss of customer trust.
recommendation: |
  Implement a password policy that enforces a minimum length of at least 12 characters and encourages the use of passphrases. Check new passwords against a list of commonly breached passwords (e.g., the Have I Been Pwned database) and reject any matches. Implement account lockout or progressive delays after repeated failed login attempts to mitigate brute-force attacks. Consider adopting NIST SP 800-63B guidelines, which recommend focusing on password length over complexity rules, and encourage the use of password managers. Complement password authentication with multi-factor authentication for an additional layer of security.
references:
  - CWE-521
  - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
