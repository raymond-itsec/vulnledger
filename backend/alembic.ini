[alembic]
script_location = alembic
prepend_sys_path = .

[post_write_hooks]

# Logging is configured by `app.logging_config.configure_logging()`,
# called from `alembic/env.py`. The legacy `[loggers]` / `[handlers]` /
# `[formatters]` blocks were removed so alembic and sqlalchemy log lines
# go through the same JSON formatter the rest of the app uses (one log
# shape across the whole stack).
