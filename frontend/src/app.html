<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic metadata -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="color-scheme" content="light dark" />

  <!-- Standard favicons -->
  <link rel="icon" href="%sveltekit.assets%/branding/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/branding/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/branding/favicon-16x16.png" />

  <!-- Apple / Safari -->
  <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/branding/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="VulnLedger" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- PWA / Android / Chromium -->
  <link rel="manifest" href="%sveltekit.assets%/branding/site.webmanifest" />

  <!-- Legacy Windows tile support -->
  <meta name="msapplication-TileColor" content="#0f172a" />

  <!-- Self-hosted fonts: Inter + JetBrains Mono variable WOFF2.
       Declared via @font-face in src/lib/styles/fonts.css.
       Preload the upright variable file so first paint isn't FOUT. -->
  <link rel="preload" as="font" type="font/woff2" crossorigin
        href="%sveltekit.assets%/fonts/inter/InterVariable.woff2" />

  <script src="%sveltekit.assets%/crypto-polyfill.js"></script>
  %sveltekit.head%
</head>
<body data-sveltekit-prerender="false">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
