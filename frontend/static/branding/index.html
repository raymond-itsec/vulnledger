<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vulny Clip Transparency Check</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 170, 130, 0.95) 0%, rgba(255, 170, 130, 0) 48%),
        radial-gradient(circle at 82% 26%, rgba(124, 170, 255, 0.92) 0%, rgba(124, 170, 255, 0) 46%),
        linear-gradient(135deg, #1f2133 0%, #2a2540 48%, #14395a 100%);
    }

    .card {
      width: min(92vw, 760px);
      padding: 2rem;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      text-align: center;
      color: #f8fbff;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.25rem, 2.2vw, 1.7rem);
      font-weight: 700;
    }

    p {
      margin: 0 0 1.25rem;
      opacity: 0.9;
    }

    img {
      max-width: min(70vw, 520px);
      max-height: 55vh;
      width: auto;
      height: auto;
      display: inline-block;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Transparency Check</h1>
    <p>If the PNG is transparent, only the graphic should be visible and the gradient should show through.</p>
    <img src="./vulny-clip.png" alt="Vulny Clip" />
  </main>
</body>
</html>
