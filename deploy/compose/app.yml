# App tier - stateless services.
#
# Runs:
#   - backend (FastAPI/uvicorn)
#   - frontend (SvelteKit static, served by Vite preview)
#
# In allinone mode (single dev box): runs alongside data + edge tiers
# on the same Docker daemon.
#
# In multihost mode (4 ESXi VMs): runs alone on `vl-app`. Backend
# reaches Postgres on `vl-data` via `vl-data.vuln.lan` (resolves to
# vlan-backend underlay IP `10.30.0.2`). Caddy on `vl-edge` reaches
# backend at `vl-app.vuln.lan:8000`.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      FINDINGS_LOG_LEVEL: ${FINDINGS_LOG_LEVEL:-INFO}
      FINDINGS_RUNTIME_MODE: ${FINDINGS_RUNTIME_MODE:-development}
      POSTGRES_HOST: ${POSTGRES_HOST:?Set POSTGRES_HOST in .env}
      POSTGRES_SERVICE_PORT: ${POSTGRES_SERVICE_PORT:?Set POSTGRES_SERVICE_PORT in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      FINDINGS_TRUST_PROXY_HEADERS: ${FINDINGS_TRUST_PROXY_HEADERS:-true}
      FINDINGS_ALLOWED_ORIGINS: ${FINDINGS_ALLOWED_ORIGINS:-["http://localhost:5173","http://localhost:3000"]}
      FINDINGS_ALLOWED_METHODS: ${FINDINGS_ALLOWED_METHODS:-["GET","POST","PATCH","DELETE","OPTIONS"]}
      FINDINGS_ALLOWED_HEADERS: ${FINDINGS_ALLOWED_HEADERS:-["Authorization","Content-Type","Accept","If-None-Match"]}
      FINDINGS_OBJECT_STORAGE_ENDPOINT: ${FINDINGS_OBJECT_STORAGE_ENDPOINT:-seaweedfs:8333}
      FINDINGS_OBJECT_STORAGE_ACCESS_KEY: ${SEAWEEDFS_S3_ACCESS_KEY:?Set SEAWEEDFS_S3_ACCESS_KEY in .env}
      FINDINGS_OBJECT_STORAGE_SECRET_KEY: ${SEAWEEDFS_S3_SECRET_KEY:?Set SEAWEEDFS_S3_SECRET_KEY in .env}
      FINDINGS_OBJECT_STORAGE_SECURE: ${FINDINGS_OBJECT_STORAGE_SECURE:-false}
      FINDINGS_OBJECT_STORAGE_EVIDENCE_BUCKET: ${FINDINGS_OBJECT_STORAGE_EVIDENCE_BUCKET:-finding-attachments}
      FINDINGS_OBJECT_STORAGE_REPORTS_BUCKET: ${FINDINGS_OBJECT_STORAGE_REPORTS_BUCKET:-generated-reports}
      FINDINGS_REPORT_RETENTION_DAYS: ${FINDINGS_REPORT_RETENTION_DAYS:-365}
      FINDINGS_ATTACHMENT_MAX_FILE_SIZE_MB: ${FINDINGS_ATTACHMENT_MAX_FILE_SIZE_MB:-25}
      FINDINGS_REPORT_MAX_FINDINGS: ${FINDINGS_REPORT_MAX_FINDINGS:-250}
      FINDINGS_REPORT_MAX_INPUT_CHARS: ${FINDINGS_REPORT_MAX_INPUT_CHARS:-200000}
      FINDINGS_REPORT_MAX_OUTPUT_SIZE_MB: ${FINDINGS_REPORT_MAX_OUTPUT_SIZE_MB:-25}
      FINDINGS_ACCESS_TOKEN_EXPIRE_MINUTES: ${FINDINGS_ACCESS_TOKEN_EXPIRE_MINUTES:-5}
      FINDINGS_REFRESH_TOKEN_EXPIRE_DAYS: ${FINDINGS_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FINDINGS_REFRESH_TOKEN_FAMILY_MAX_LIFETIME_DAYS: ${FINDINGS_REFRESH_TOKEN_FAMILY_MAX_LIFETIME_DAYS:-30}
      FINDINGS_REFRESH_SESSION_RETENTION_DAYS: ${FINDINGS_REFRESH_SESSION_RETENTION_DAYS:-}
      FINDINGS_RATE_LIMIT_LOGIN: ${FINDINGS_RATE_LIMIT_LOGIN:-5/minute}
      FINDINGS_RATE_LIMIT_API: ${FINDINGS_RATE_LIMIT_API:-60/minute}
      FINDINGS_MAILJET_API_KEY: ${FINDINGS_MAILJET_API_KEY:-}
      FINDINGS_MAILJET_API_SECRET: ${FINDINGS_MAILJET_API_SECRET:-}
      FINDINGS_MAILJET_FROM_EMAIL: ${FINDINGS_MAILJET_FROM_EMAIL:-noreply@findings.local}
      FINDINGS_MAILJET_FROM_NAME: ${FINDINGS_MAILJET_FROM_NAME:-VulnLedger}
      FINDINGS_APP_BASE_URL: ${FINDINGS_APP_BASE_URL:-http://localhost}
      FINDINGS_INITIAL_ADMIN_USERNAME: ${FINDINGS_INITIAL_ADMIN_USERNAME:?Set FINDINGS_INITIAL_ADMIN_USERNAME in .env}
      FINDINGS_INITIAL_ADMIN_PASSWORD: ${FINDINGS_INITIAL_ADMIN_PASSWORD:?Set FINDINGS_INITIAL_ADMIN_PASSWORD in .env}
      FINDINGS_INITIAL_ADMIN_EMAIL: ${FINDINGS_INITIAL_ADMIN_EMAIL:?Set FINDINGS_INITIAL_ADMIN_EMAIL in .env}
      FINDINGS_INITIAL_ADMIN_FULL_NAME: ${FINDINGS_INITIAL_ADMIN_FULL_NAME:?Set FINDINGS_INITIAL_ADMIN_FULL_NAME in .env}
      # Synthetic monitoring user. Optional: when all three are set the
      # backend seeds a low-privilege reviewer account the synthetic-probe
      # logs in as. Unset -> seed skipped, probe reports down.
      FINDINGS_SYNTHETIC_USER_USERNAME: ${FINDINGS_SYNTHETIC_USER_USERNAME:-}
      FINDINGS_SYNTHETIC_USER_PASSWORD: ${FINDINGS_SYNTHETIC_USER_PASSWORD:-}
      FINDINGS_SYNTHETIC_USER_EMAIL: ${FINDINGS_SYNTHETIC_USER_EMAIL:-}
      FINDINGS_APP_VERSION: ${APP_VERSION}
      FINDINGS_CLAMAV_HOST: ${FINDINGS_CLAMAV_HOST:-clamav}
      FINDINGS_CLAMAV_PORT: ${FINDINGS_CLAMAV_PORT:-3310}
      FINDINGS_JWT_ISSUER: ${FINDINGS_JWT_ISSUER:?Set FINDINGS_JWT_ISSUER in .env}
      FINDINGS_JWT_AUDIENCE: ${FINDINGS_JWT_AUDIENCE:?Set FINDINGS_JWT_AUDIENCE in .env}
      FINDINGS_JWT_PRIVATE_KEY_PEM: ${FINDINGS_JWT_PRIVATE_KEY_PEM:-}
      FINDINGS_JWT_PUBLIC_KEY_PEM: ${FINDINGS_JWT_PUBLIC_KEY_PEM:-}
      FINDINGS_JWT_PRIVATE_KEY_FILE: ${FINDINGS_JWT_PRIVATE_KEY_FILE:-}
      FINDINGS_JWT_PUBLIC_KEY_FILE: ${FINDINGS_JWT_PUBLIC_KEY_FILE:-}
      FINDINGS_OIDC_ENABLED: ${FINDINGS_OIDC_ENABLED:-false}
      FINDINGS_OIDC_CLIENT_ID: ${FINDINGS_OIDC_CLIENT_ID:-}
      FINDINGS_OIDC_CLIENT_SECRET: ${FINDINGS_OIDC_CLIENT_SECRET:-}
      FINDINGS_OIDC_DISCOVERY_URL: ${FINDINGS_OIDC_DISCOVERY_URL:-}
      FINDINGS_OIDC_REDIRECT_URI: ${FINDINGS_OIDC_REDIRECT_URI:-}
      FINDINGS_OIDC_REDIRECT_URI_ALLOWLIST: ${FINDINGS_OIDC_REDIRECT_URI_ALLOWLIST:-[]}
      FINDINGS_OIDC_REQUIRE_NONCE: ${FINDINGS_OIDC_REQUIRE_NONCE:-true}
      FINDINGS_OIDC_DEFAULT_ROLE: ${FINDINGS_OIDC_DEFAULT_ROLE:-reviewer}
      # Auto-generated API docs toggles. config.py defaults both to
      # True; explicitly forwarding here so operator overrides via .env
      # actually reach the container. (Pre-Phase-2 docker-compose.yml
      # left these unset, which meant FINDINGS_SWAGGER_UI_ENABLED=false
      # in .env was silently ignored - footgun. #37 fold-in 2026-05-05.)
      FINDINGS_SWAGGER_UI_ENABLED: ${FINDINGS_SWAGGER_UI_ENABLED:-true}
      FINDINGS_REDOC_ENABLED: ${FINDINGS_REDOC_ENABLED:-true}
    volumes:
      - ../../secrets:/run/secrets:ro
      - ../../.env:/run/config/vulnledger.env:ro
      - ../../docker-compose.yml:/run/config/docker-compose.yml:ro
    networks:
      - frontend_net    # caddy (on edge tier) reaches backend here
      - backend_net     # backend reaches db / seaweedfs / clamav (on data tier) here
    healthcheck:
      # Use the dedicated liveness probe under the v1 prefix. The endpoint
      # is restricted to RFC1918 and loopback source IPs, so the in-container
      # request from 127.0.0.1 is allowed. Closes #25 (swap healthcheck off
      # /openapi.json now that the schema moved under /api/v1/).
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  frontend:
    build:
      context: ../../frontend
      args:
        APP_VERSION: ${APP_VERSION}
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    networks:
      - frontend_net    # caddy (on edge tier) reaches frontend SPA here

  # ---- Observability sidecars (app tier) ---------------------------
  # See edge.yml header for the per-host vmagent + bounded buffer rationale.

  vmagent-app:
    image: victoriametrics/vmagent:${VM_VERSION:?Set VM_VERSION (loaded from deploy/profiles/versions.env)}${VMAGENT_IMAGE_DIGEST:-}
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    command:
      - "--promscrape.config=/etc/vmagent/scrape.yml"
      - "--remoteWrite.url=${VM_REMOTE_WRITE_URL:?Set VM_REMOTE_WRITE_URL in env profile}"
      - "--remoteWrite.tmpDataPath=/vmagent-buffer"
      - "--remoteWrite.maxDiskUsagePerURL=1GB"
      - "--httpListenAddr=:8429"
    volumes:
      - ../../monitoring/vmagent/scrape-app.yml:/etc/vmagent/scrape.yml:ro
      - vmagent_app_buffer:/vmagent-buffer
    networks:
      - frontend_net   # scrape backend:8000/api/v1/metrics here AND reach VM in allinone

  promtail-app:
    image: grafana/promtail:${LOKI_VERSION:?Set LOKI_VERSION (loaded from deploy/profiles/versions.env)}${PROMTAIL_IMAGE_DIGEST:-}
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    environment:
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:?Set LOKI_PUSH_URL in env profile}
      PROMTAIL_HOST: vl-app
      PROMTAIL_TIER: app
    volumes:
      - ../../monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - frontend_net

  node-exporter-app:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:?Set NODE_EXPORTER_VERSION (loaded from deploy/profiles/versions.env)}${NODE_EXPORTER_IMAGE_DIGEST:-}
    # See edge.yml node-exporter-edge for why this is multihost-only.
    profiles: ["multihost"]
    # See edge.yml node-exporter-edge for why hostname is set.
    hostname: vl-app
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    networks:
      - frontend_net
    pid: host

  cadvisor-app:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:?Set CADVISOR_VERSION (loaded from deploy/profiles/versions.env)}${CADVISOR_IMAGE_DIGEST:-}
    # See edge.yml cadvisor-edge for why this is multihost-only.
    profiles: ["multihost"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    privileged: true
    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
      - "--store_container_labels=false"
      - "--whitelisted_container_labels=com.docker.compose.project,com.docker.compose.service"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - frontend_net

  # Synthetic auth-flow probe. Loops login -> refresh -> logout against
  # the backend and exposes the result on :8900/metrics. Lives on the
  # app tier so `backend` resolves by local Docker DNS in allinone,
  # samedc, and crossdc alike. No `profiles:` key - runs in every mode.
  # Scraped by vmagent-app (see scrape-app.yml).
  synthetic-probe:
    build:
      context: ../../monitoring/synthetic-probe
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    environment:
      PROBE_TARGET_URL: ${PROBE_TARGET_URL:-http://backend:8000}
      PROBE_USERNAME: ${FINDINGS_SYNTHETIC_USER_USERNAME:-}
      PROBE_PASSWORD: ${FINDINGS_SYNTHETIC_USER_PASSWORD:-}
      PROBE_INTERVAL: ${PROBE_INTERVAL:-300}
    networks:
      - frontend_net   # reach backend:8000 on the app tier's daemon

  # blackbox-exporter for the frontend smoke check (and TLS-expiry once
  # HTTPS fronts prod). Lives on the app tier so it probes the frontend
  # container by local Docker DNS (`frontend:5173`) in allinone, samedc,
  # and crossdc alike - the frontend is always co-located with this
  # tier. No `profiles:` key - runs in every mode. Scraped by
  # vmagent-app via the relabel pattern in scrape-app.yml.
  blackbox-exporter:
    image: prom/blackbox-exporter:${BLACKBOX_EXPORTER_VERSION:?Set BLACKBOX_EXPORTER_VERSION (loaded from deploy/profiles/versions.env)}${BLACKBOX_EXPORTER_IMAGE_DIGEST:-}
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    volumes:
      - ../../monitoring/blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - frontend_net   # probe frontend:5173 on the app tier's daemon

volumes:
  vmagent_app_buffer:

networks:
  # Each tier file declares the networks it uses with a stable
  # `name:`. In allinone mode (`include:` merges all 4 tier files)
  # Compose deduplicates identical declarations across files. In
  # multihost mode each tier file is its own compose project on its
  # own VM and creates the network locally. Same compose source,
  # both modes work.
  frontend_net:
    name: vulnledger_frontend_net
  backend_net:
    name: vulnledger_backend_net
