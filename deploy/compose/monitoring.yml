# Monitoring tier - empty stub.
#
# This file exists so the per-tier compose split is complete from
# Phase 2 onward (Make targets and the multihost deploy script can
# reference it without conditional logic). Phase 8 fills in:
#
#   - VictoriaMetrics (TSDB)
#   - vmagent (scrapes /api/v1/metrics on backend, plus per-VM
#              node-exporter + cAdvisor on every tier)
#   - vmalert + Alertmanager
#   - Grafana (internal dashboards behind SSO; public statuspage at
#              /status/ proxied via Caddy)
#   - Loki + promtail (log aggregation)
#
# In multihost mode this file runs on `vl-monitoring` (1 NIC on
# vlan-wg-underlay only). Scraping reaches every other tier via the
# WireGuard mesh, so no NICs on vlan-frontend or vlan-backend are
# needed.

services: {}

