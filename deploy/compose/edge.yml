# Edge tier - public-facing reverse proxy.
#
# Runs:
#   - caddy-init (one-shot bootstrap that fixes data/config volume perms)
#   - caddy (the actual reverse proxy listening on :80 / :443)
#
# In allinone mode (single dev box): runs alongside app + data tiers
# on the same Docker daemon. Caddy reaches backend / frontend via
# the shared `frontend_net` Docker bridge.
#
# In multihost mode (4 ESXi VMs): runs alone on `vl-edge`. Caddy
# reaches backend on `vl-app.vuln.lan:8000` and frontend on
# `vl-app.vuln.lan:5173` (resolves via /etc/hosts to the
# vlan-frontend underlay IP `10.20.0.2`). The Caddyfile uses
# upstream addresses driven by env vars so the same file works
# in both modes.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy-init:
    build:
      context: ../../caddy
    image: vulnledger-caddy:2.11.2-ratelimit
    restart: "no"
    logging: *default-logging
    user: "0:0"
    entrypoint: ["/usr/local/bin/volume-migrate.sh"]
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    # No network needed - just touches volumes.

  caddy:
    build:
      context: ../../caddy
    image: vulnledger-caddy:2.11.2-ratelimit
    restart: unless-stopped
    logging: *default-logging
    user: "10001:10001"
    cap_drop: ["ALL"]
    cap_add: ["NET_BIND_SERVICE"]
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    depends_on:
      caddy-init:
        condition: service_completed_successfully
    environment:
      CADDY_HOST: ${CADDY_HOST:-http://localhost}
      CADDY_ATTACHMENT_MAX_SIZE: ${CADDY_ATTACHMENT_MAX_SIZE:-30MB}
      # Upstream targets - in allinone these are Docker DNS names that
      # resolve via the shared frontend_net bridge. In multihost these
      # are FQDNs in vuln.lan that resolve via /etc/hosts to vl-app's
      # vlan-frontend underlay IP.
      CADDY_BACKEND_UPSTREAM: ${CADDY_BACKEND_UPSTREAM:-backend:8000}
      CADDY_FRONTEND_UPSTREAM: ${CADDY_FRONTEND_UPSTREAM:-frontend:5173}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    volumes:
      - ../../Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend_net    # caddy → backend, caddy → frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ---- Observability sidecars (edge tier) --------------------------
  # Pattern repeats across every tier: vmagent (metrics scraper),
  # promtail (log shipper), node-exporter (host metrics), cadvisor
  # (container metrics). Per-host vmagent so each tier buffers its
  # own metrics across a transient cross-DC link blip; remoteWrite
  # disk usage capped at 1GB/URL so a long monitoring-tier outage
  # never fills the host's disk.

  vmagent-edge:
    image: victoriametrics/vmagent:${VM_VERSION:?Set VM_VERSION (loaded from deploy/profiles/versions.env)}${VMAGENT_IMAGE_DIGEST:-}
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    command:
      - "--promscrape.config=/etc/vmagent/scrape.yml"
      - "--remoteWrite.url=${VM_REMOTE_WRITE_URL:?Set VM_REMOTE_WRITE_URL in env profile}"
      - "--remoteWrite.tmpDataPath=/vmagent-buffer"
      - "--remoteWrite.maxDiskUsagePerURL=1GB"
      - "--httpListenAddr=:8429"
    volumes:
      - ../../monitoring/vmagent/scrape-edge.yml:/etc/vmagent/scrape.yml:ro
      - vmagent_edge_buffer:/vmagent-buffer
    networks:
      - frontend_net   # scrape caddy:2019 here AND reach victoriametrics in allinone

  promtail-edge:
    image: grafana/promtail:${LOKI_VERSION:?Set LOKI_VERSION (loaded from deploy/profiles/versions.env)}${PROMTAIL_IMAGE_DIGEST:-}
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    environment:
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:?Set LOKI_PUSH_URL in env profile}
      PROMTAIL_HOST: vl-edge
      PROMTAIL_TIER: edge
    volumes:
      - ../../monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - frontend_net   # reach loki here in allinone

  node-exporter-edge:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:?Set NODE_EXPORTER_VERSION (loaded from deploy/profiles/versions.env)}${NODE_EXPORTER_IMAGE_DIGEST:-}
    # Hostname feeds into node_uname_info{nodename=...}, which Grafana
    # dashboard 1860 (Node Exporter Full) uses for the $node picker.
    # Without this, uname -n returns the random Docker container ID.
    hostname: vl-edge
    restart: unless-stopped
    logging: *default-logging
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    networks:
      - frontend_net   # vmagent-edge scrapes here
    pid: host

  cadvisor-edge:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:?Set CADVISOR_VERSION (loaded from deploy/profiles/versions.env)}${CADVISOR_IMAGE_DIGEST:-}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    privileged: true
    command:
      - "--housekeeping_interval=30s"
      - "--docker_only=true"
      - "--store_container_labels=false"
      - "--whitelisted_container_labels=com.docker.compose.project,com.docker.compose.service"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - frontend_net   # vmagent-edge scrapes here

volumes:
  caddy_data:
  caddy_config:
  vmagent_edge_buffer:

networks:
  # Each tier file declares the networks it uses with a stable
  # `name:`. In allinone mode (`include:` merges all 4 tier files)
  # Compose deduplicates identical declarations across files. In
  # multihost mode each tier file is its own compose project on its
  # own VM and creates the network locally. Same compose source,
  # both modes work.
  frontend_net:
    name: vulnledger_frontend_net
