# Declarative health-check config for Gatus.
#
# The monitoring profile in docker-compose.yml mounts this file read-only
# into the gatus container. Add alert channels (slack / discord / email /
# webhook) inline per the Gatus docs: https://gatus.io/docs/alerting
#
# Addresses target the docker network names and each image's fixed
# listening port (not the host-side port mappings in .env).
metrics: false

ui:
  title: "VulnLedger — Service Health"
  header: "VulnLedger"

endpoints:
  - name: backend-api
    group: core
    url: "http://backend:8000/api/health/live"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 2000"

  - name: caddy-edge
    group: core
    url: "http://caddy/api/health/live"
    interval: 30s
    conditions:
      - "[STATUS] == 200"

  - name: postgres
    group: infra
    # Gatus has no built-in postgres endpoint type; a TCP reachability check
    # is sufficient here. End-to-end DB liveness is covered transitively by
    # the backend-api endpoint, which fails fast if Postgres is unreachable.
    url: "tcp://db:5432"
    interval: 60s
    conditions:
      - "[CONNECTED] == true"

  - name: seaweedfs-s3
    group: infra
    url: "tcp://seaweedfs:8333"
    interval: 30s
    conditions:
      - "[CONNECTED] == true"

  - name: clamav
    group: infra
    url: "tcp://clamav:3310"
    interval: 60s
    conditions:
      - "[CONNECTED] == true"
