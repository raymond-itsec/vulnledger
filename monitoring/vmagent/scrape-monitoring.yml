# vmagent scrape config for the MONITORING tier itself.
#
# Targets:
#   - VictoriaMetrics own metrics
#   - vmalert own metrics
#   - alertmanager own metrics
#   - grafana own metrics
#   - loki own metrics
#   - node-exporter on monitoring host
#   - cadvisor on monitoring host
#
# Self-scraping closes the "who watches the watchman" gap partially:
# we can graph the monitoring stack's own resource usage. The
# operator-facing safety net for monitoring being entirely down is
# the deadman heartbeat (see vmalert/rules/deadman.rules.yml).

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  external_labels:
    host: vl-monitoring
    tier: monitoring

scrape_configs:
  - job_name: victoriametrics
    static_configs:
      - targets: ['victoriametrics:8428']
        labels:
          service: victoriametrics

  - job_name: vmalert
    static_configs:
      - targets: ['vmalert:8880']
        labels:
          service: vmalert

  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: alertmanager

  - job_name: grafana
    # GF_SERVER_SERVE_FROM_SUB_PATH=true rewrites all paths under
    # /grafana/, including /metrics. Without this prefix the scrape
    # gets the SPA HTML and parses as an empty exposition.
    metrics_path: /grafana/metrics
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: grafana

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: loki

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter-monitoring:9100']
        labels:
          service: node-exporter

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor-monitoring:8080']
        labels:
          service: cadvisor
