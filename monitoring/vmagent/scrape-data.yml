# vmagent scrape config for the DATA tier.
#
# Targets reachable on this host:
#   - postgres-exporter (DB-internal metrics on :9187)
#   - node-exporter (host metrics; importantly ALSO emits the
#     backup-age metric via its textfile collector reading
#     /var/lib/node-exporter/textfile/backup.prom)
#   - cadvisor

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  external_labels:
    host: vl-data
    tier: data

scrape_configs:
  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgres

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter-data:9100']
        labels:
          service: node-exporter

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor-data:8080']
        labels:
          service: cadvisor
