# Grafana data source: VictoriaMetrics via the Prometheus-compatible API.
#
# VM speaks the Prometheus query API on /api/v1/query etc., so the
# stock Prometheus datasource works without any plugin install.
#
# `editable: false` so operators don't accidentally retarget this
# datasource via the UI. Changes go through this file.

apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    uid: victoriametrics
    url: http://victoriametrics:8428
    access: proxy
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s
      httpMethod: POST
