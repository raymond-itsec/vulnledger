# Loki configuration: filesystem-backed, gzip on disk, 1y retention.
#
# Sized for a 4-host VulnLedger deployment with moderate log volume
# (~ 100 MB/day per host before compression). With gzip and 1-year
# retention that's roughly 15-40 GB on the loki_data volume; size the
# host disk accordingly. Retention is set to match the ~12-month
# VictoriaMetrics metric retention so logs and metrics cover the same
# window during an incident review.
#
# Cross-DC bandwidth: promtail batches + gzips before push; per-line
# size capped at 256 KB to reject the rare WeasyPrint stack-trace
# bomb that could otherwise monopolize the connection.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /var/loki
  storage:
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ingester:
  chunk_idle_period: 1h
  chunk_target_size: 1048576       # 1 MiB
  chunk_block_size: 262144         # 256 KiB
  chunk_retain_period: 30s
  max_chunk_age: 2h

limits_config:
  retention_period: 8760h          # 1 year, matched to the VM metric
                                   # retention window. security-audit
                                   # logs additionally have their own
                                   # authoritative copy in the
                                   # AuthSecurityEvent DB table; Loki
                                   # holds the searchable operational
                                   # log copy.
  max_line_size: 262144            # 256 KiB per log line
  reject_old_samples: true
  reject_old_samples_max_age: 168h # 7 days
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 20MB

compactor:
  working_directory: /var/loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

ruler:
  storage:
    type: local
    local:
      directory: /var/loki/rules

analytics:
  reporting_enabled: false         # No usage-stat phone-home upstream
