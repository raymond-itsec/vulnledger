name: Frontend Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate SvelteKit type files
        # frontend/tsconfig.json extends ./.svelte-kit/tsconfig.json,
        # which SvelteKit generates lazily during `vite build` or
        # `svelte-kit sync`. Without it, vitest's oxc transformer fails
        # to load tsconfig and every test file errors with
        # `[TSCONFIG_ERROR] Tsconfig not found`. Locally this is masked
        # by a prior dev/build run leaving `.svelte-kit/` populated;
        # on a fresh CI clone it must be generated explicitly.
        run: npx svelte-kit sync
      - name: Run vitest
        run: npm test
