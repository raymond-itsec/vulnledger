# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow file requires a free account on Semgrep.dev to
# manage rules, file ignores, notifications, and more.
#
# See https://semgrep.dev/docs

name: Semgrep

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '21 13 * * 4'

permissions:
  contents: read

jobs:
  semgrep:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Scan
    runs-on: ubuntu-latest
    steps:
      # Checkout project source
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep CLI
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep scan (CI mode with token)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
        run: |
          if [ -z "${SEMGREP_APP_TOKEN:-}" ] && [ -n "${APP_TOKEN:-}" ]; then
            export SEMGREP_APP_TOKEN="${APP_TOKEN}"
          fi

          if [ -n "${SEMGREP_APP_TOKEN:-}" ]; then
            semgrep ci --sarif --output=semgrep.sarif
          else
            echo "SEMGREP_APP_TOKEN/APP_TOKEN not set; falling back to OSS scan mode."
            semgrep scan --config auto --sarif --output=semgrep.sarif
          fi

      # Upload SARIF file generated in previous step
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always()

      - name: Semgrep summary
        # Counts only OPEN Semgrep alerts as recorded by GitHub Code
        # Scanning, not raw SARIF results. Reason: the SARIF that
        # Semgrep emits each run includes every finding it can see,
        # ignoring our prior triage. Counting the SARIF directly meant
        # already-dismissed false positives kept showing up in the
        # summary forever, training us to ignore the warning chip.
        # Querying the Code Scanning API for state=open respects
        # dismissals so the summary only flags what actually needs
        # attention. Tool name covers both "Semgrep OSS" and
        # "Semgrep PRO" (Semgrep ships them under different SARIF
        # producer names depending on subscription tier).
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          gh api \
            "repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&per_page=100" \
            --paginate > /tmp/cs-alerts.json 2>/tmp/cs-alerts.err
          api_ec=$?
          set -e
          if [ "$api_ec" -ne 0 ] || [ ! -s /tmp/cs-alerts.json ]; then
            {
              echo "## ⚠️ Semgrep"
              echo ""
              echo "Could not query Code Scanning API for open alerts. Falling back to raw SARIF count."
              if [ -s /tmp/cs-alerts.err ]; then
                echo ""
                echo '```'
                head -5 /tmp/cs-alerts.err
                echo '```'
              fi
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Filter to Semgrep alerts (OSS + PRO). gh --paginate
          # concatenates JSON arrays into a single stream, so we wrap
          # with `[inputs]` via -s.
          semgrep_alerts=$(jq -s '[.[][] | select(.tool.name | test("^Semgrep"))]' /tmp/cs-alerts.json 2>/dev/null || echo '[]')
          total=$(echo "$semgrep_alerts" | jq 'length' 2>/dev/null || echo 0)
          if [ "${total:-0}" = "0" ]; then
            {
              echo "## ✅ Semgrep"
              echo ""
              echo "**No open findings.** (Dismissed alerts are excluded from this view.)"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            error_count=$(echo "$semgrep_alerts" | jq '[.[] | select(.rule.severity == "error")] | length' 2>/dev/null || echo 0)
            warn_count=$(echo "$semgrep_alerts" | jq '[.[] | select(.rule.severity == "warning")] | length' 2>/dev/null || echo 0)
            note_count=$(echo "$semgrep_alerts" | jq '[.[] | select(.rule.severity == "note")] | length' 2>/dev/null || echo 0)
            {
              echo "## ⚠️ Semgrep"
              echo ""
              echo "**$total open finding(s)** — error: $error_count, warning: $warn_count, note: $note_count. (Dismissed alerts excluded.)"
              echo ""
              echo "Top rules by hit count:"
              echo ""
              echo "| Count | Rule | Severity |"
              echo "|---|---|---|"
              echo "$semgrep_alerts" | jq -r '
                group_by(.rule.id)
                | map({rule: .[0].rule.id, severity: .[0].rule.severity, count: length})
                | sort_by(-.count)
                | .[]
                | "| \(.count) | \(.rule) | \(.severity) |"
              ' | head -10
              echo ""
              echo "Full detail: see the **Code Scanning** tab on the repository."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
