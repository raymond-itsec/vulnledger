# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow file requires a free account on Semgrep.dev to
# manage rules, file ignores, notifications, and more.
#
# See https://semgrep.dev/docs

name: Semgrep

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '21 13 * * 4'

permissions:
  contents: read

jobs:
  semgrep:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Scan
    runs-on: ubuntu-latest
    steps:
      # Checkout project source
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep CLI
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep scan (CI mode with token)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
        run: |
          if [ -z "${SEMGREP_APP_TOKEN:-}" ] && [ -n "${APP_TOKEN:-}" ]; then
            export SEMGREP_APP_TOKEN="${APP_TOKEN}"
          fi

          if [ -n "${SEMGREP_APP_TOKEN:-}" ]; then
            semgrep ci --sarif --output=semgrep.sarif
          else
            echo "SEMGREP_APP_TOKEN/APP_TOKEN not set; falling back to OSS scan mode."
            semgrep scan --config auto --sarif --output=semgrep.sarif
          fi

      # Upload SARIF file generated in previous step
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always()

      - name: Semgrep summary
        # Parses the SARIF for finding counts so the GitHub Actions
        # Summary tab gives a one-glance pass/fail with severity
        # breakdown. The full set of findings still flows into the
        # repo's Code Scanning tab via the upload-sarif step above.
        if: always()
        run: |
          if [ ! -s semgrep.sarif ]; then
            {
              echo "## ⚠️ Semgrep"
              echo ""
              echo "Scan produced no SARIF output (skipped or failed before producing results)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # SARIF level values per spec: error / warning / note / none.
          # Treat error+warning as the actionable count; note is
          # informational and not gating.
          error_count=$(jq '[.runs[]?.results[]? | select(.level == "error")] | length' semgrep.sarif)
          warn_count=$(jq '[.runs[]?.results[]? | select(.level == "warning")] | length' semgrep.sarif)
          note_count=$(jq '[.runs[]?.results[]? | select(.level == "note")] | length' semgrep.sarif)
          # Default level when not set is "warning" per SARIF; fold
          # those counts into warnings.
          unset_count=$(jq '[.runs[]?.results[]? | select(.level == null)] | length' semgrep.sarif)
          warn_count=$((warn_count + unset_count))
          total=$((error_count + warn_count + note_count))
          if [ "$total" -eq 0 ]; then
            {
              echo "## ✅ Semgrep"
              echo ""
              echo "**No findings.**"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## ⚠️ Semgrep"
              echo ""
              echo "**$total finding(s)** — error: $error_count, warning: $warn_count, note: $note_count."
              echo ""
              echo "Top rules by hit count:"
              echo ""
              echo "| Count | Rule |"
              echo "|---|---|"
              jq -r '
                [.runs[]?.results[]?.ruleId // "?"]
                | group_by(.) | map({rule: .[0], count: length})
                | sort_by(-.count)
                | .[]
                | "| \(.count) | \(.rule) |"
              ' semgrep.sarif | head -10
              echo ""
              echo "Full detail: see the **Code Scanning** tab on the repository."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
