name: Docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install mkdocs-material
        run: pip install --upgrade pip mkdocs-material
      - name: Build site
        # Tee mkdocs output so the warning lines stay visible in the
        # job log AND can be parsed by the summary step. `--strict`
        # already fails the job on any warning, so the build step
        # itself gates correctness; the summary just describes what
        # was built (or which warning broke it).
        run: |
          set -o pipefail
          mkdocs build --strict 2>&1 | tee /tmp/mkdocs.log
      - name: Docs build summary
        if: always()
        run: |
          if [ ! -f /tmp/mkdocs.log ]; then
            {
              echo "## ⚠️ mkdocs build"
              echo ""
              echo "Build did not produce a log file."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Page count from the built site dir; falls back to log
          # parsing if the site dir is missing (build failed before
          # writing any pages).
          if [ -d site ]; then
            pages=$(find site -name 'index.html' | wc -l | tr -d ' ')
          else
            pages=0
          fi
          warnings=$(grep -cE 'WARNING|ERROR' /tmp/mkdocs.log 2>/dev/null || echo 0)
          if [ "${warnings:-0}" = "0" ]; then
            {
              echo "## ✅ mkdocs build"
              echo ""
              echo "**Built $pages page(s)** with no warnings."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## ❌ mkdocs build"
              echo ""
              echo "**$warnings warning/error line(s)** during build of $pages page(s)."
              echo ""
              echo "<details><summary>Warnings</summary>"
              echo ""
              echo '```'
              grep -E 'WARNING|ERROR' /tmp/mkdocs.log | head -30
              echo '```'
              echo ""
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
