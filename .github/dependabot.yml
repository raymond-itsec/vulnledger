  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "backend"
      - "security"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "frontend"
      - "security"
    open-pull-requests-limit: 10
