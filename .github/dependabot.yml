version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/backup"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/caddy"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "ci"
      - "security"
