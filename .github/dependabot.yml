version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:03"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/backup"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:06"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/caddy"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:09"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "docker"
      - "security"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "ci"
      - "security"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "backend"
      - "security"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:45"
      timezone: "Europe/Amsterdam"
    target-branch: "main"
    labels:
      - "dependencies"
      - "frontend"
      - "security"
    open-pull-requests-limit: 5
